<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ShopPTODO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./src/admin.css">
</head>
<body>
    <!-- LOGIN OVERLAY -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-modal">
            <div class="login-header">
                <i class="fas fa-lock"></i>
                <h2>Acceso Administrador</h2>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="adminPassword">Contraseña</label>
                    <input type="password" id="adminPassword" placeholder="Ingresa la contraseña" required>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
                <p class="login-error" id="loginError">Contraseña incorrecta</p>
            </form>
        </div>
    </div>

    <div class="admin-content hidden" id="adminContent">
    <header class="admin-header">
        <div class="header-container">
            <a href="./" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-store"></i>
                </div>
                <span>ShopPTODO Admin</span>
            </a>
            <div class="header-actions">
                <button class="change-password-btn" id="changePasswordBtn">
                    <i class="fas fa-key"></i> Cambiar Contraseña
                </button>
                <a href="./" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Volver a la Tienda
                </a>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <section class="add-product-section">
            <h2><i class="fas fa-plus-circle"></i> Añadir Nuevo Producto</h2>
            <form id="productForm" class="product-form">
                <input type="hidden" id="productId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="productName">Nombre del Producto</label>
                        <input type="text" id="productName" required>
                    </div>
                    <div class="form-group">
                        <label for="productPrice">Precio (€)</label>
                        <input type="number" id="productPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="productOldPrice">Precio Anterior (€)</label>
                        <input type="number" id="productOldPrice" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="productCategory">Categoría</label>
                        <select id="productCategory" required>
                            <option value="electronics">Electrónica</option>
                            <option value="clothing">Ropa</option>
                            <option value="home">Hogar</option>
                            <option value="books">Libros</option>
                            <option value="sports">Deportes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="productStock">Stock</label>
                        <input type="number" id="productStock" required>
                    </div>
                    <div class="form-group">
                        <label for="productRating">Valoración (1-5)</label>
                        <input type="number" id="productRating" min="1" max="5" step="0.1" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="productDescription">Descripción</label>
                        <textarea id="productDescription" rows="3" required></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label for="productImage">URL de la Imagen</label>
                        <input type="text" id="productImage" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Etiquetas</label>
                        <div class="tags-checkboxes">
                            <label><input type="checkbox" value="nuevo"> Nuevo</label>
                            <label><input type="checkbox" value="oferta"> Oferta</label>
                            <label><input type="checkbox" value="popular"> Popular</label>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <i class="fas fa-save"></i> Guardar Producto
                    </button>
                    <button type="button" class="cancel-btn" id="cancelBtn" style="display:none;">
                        <i class="fas fa-times"></i> Cancelar Edición
                    </button>
                </div>
            </form>
        </section>

        <section class="products-list-section">
            <h2><i class="fas fa-boxes"></i> Productos Existentes</h2>
            <div class="products-admin-grid" id="productsAdminGrid"></div>
        </section>

        <section class="orders-section">
            <h2><i class="fas fa-shopping-cart"></i> Pedidos Recibidos</h2>
            <div class="orders-list" id="ordersList"></div>
        </section>
    </div>

    <!-- CAMBIAR CONTRASEÑA MODAL -->
    <div class="change-password-overlay hidden" id="changePasswordOverlay">
        <div class="change-password-modal">
            <div class="change-password-header">
                <h3><i class="fas fa-key"></i> Cambiar Contraseña</h3>
                <button class="close-password" id="closePassword">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="changePasswordForm" class="change-password-form">
                <div class="form-group">
                    <label for="currentPassword">Contraseña Actual</label>
                    <input type="password" id="currentPassword" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">Nueva Contraseña</label>
                    <input type="password" id="newPassword" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" id="cancelPassword">Cancelar</button>
                    <button type="submit" class="submit-btn">Cambiar</button>
                </div>
                <p class="password-error" id="passwordError"></p>
            </form>
        </div>
    </div>

    <script type="module" src="./src/admin.js"></script>
</body>
</html>
